name: On Demand Build

on:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: confluence2md

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
            ext: .exe
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            ext: ""
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            ext: ""
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
            ext: ""
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
            ext: ""

    steps:
      - name: Checkout
        shell: bash
        run: |
          git clone --depth 1 ${{ github.server_url }}/${{ github.repository }} .
          git fetch origin ${{ github.sha }}
          git checkout ${{ github.sha }}

      - name: Compute build identifier
        id: ident
        shell: bash
        env:
          REF_NAME: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
        run: |
          SAFE_REF_NAME="${REF_NAME//\//_}"
          SHORT_SHA="${SHA:0:7}"
          echo "build_id=${SAFE_REF_NAME}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Install Rust toolchain
        run: |
          rustup toolchain install 1.95 --no-self-update
          rustup default 1.95
          rustup target add --toolchain 1.95 ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build release binary
        shell: bash
        run: |
          if [[ "${{ matrix.target }}" == "aarch64-unknown-linux-gnu" ]]; then
            export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc
          fi
          cargo build --release --locked --target ${{ matrix.target }}

      - name: Package (Unix)
        if: matrix.os != 'windows-latest'
        shell: bash
        env:
          BUILD_ID: ${{ steps.ident.outputs.build_id }}
        run: |
          cd target/${{ matrix.target }}/release
          tar czvf "../../../${{ env.BINARY_NAME }}-${BUILD_ID}-${{ matrix.target }}.tar.gz" "${{ env.BINARY_NAME }}${{ matrix.ext }}"

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        env:
          BUILD_ID: ${{ steps.ident.outputs.build_id }}
        run: |
          cd target/${{ matrix.target }}/release
          Compress-Archive -Path "${{ env.BINARY_NAME }}${{ matrix.ext }}" -DestinationPath "../../../${{ env.BINARY_NAME }}-$($env:BUILD_ID)-${{ matrix.target }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ${{ env.BINARY_NAME }}-${{ steps.ident.outputs.build_id }}-${{ matrix.target }}
          path: ${{ env.BINARY_NAME }}-${{ steps.ident.outputs.build_id }}-${{ matrix.target }}.*
          if-no-files-found: error
